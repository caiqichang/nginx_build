name: Build MinGW Toolchain

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            gcc g++ \
            gawk \
            texinfo \
            bison \
            flex \
            libgmp-dev \
            libmpfr-dev \
            libmpc-dev \
            libisl-dev \
            wget \
            xz-utils \
            git \
            ninja-build \
            cmake

      - name: Download sources
        run: |
          wget https://ftp.gnu.org/gnu/binutils/binutils-2.46.0.tar.xz
          wget https://ftp.gnu.org/gnu/gcc/gcc-15.2.0/gcc-15.2.0.tar.xz
          git clone https://github.com/mingw-w64/mingw-w64.git

          tar xf binutils-2.46.0.tar.xz
          tar xf gcc-15.2.0.tar.xz

      - name: Build MinGW-w64 UCRT (x86_64)
        run: |
          bash ./build-mingw-ucrt.sh x86_64-w64-mingw32 /opt/mingw64

      - name: Upload artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: mingw64-ucrt
          path: |
            /opt/mingw64
